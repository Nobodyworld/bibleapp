<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>Bible App Reader</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%231d4ed8'/%3E%3Ctext x='8' y='12' font-size='10' font-family='sans-serif' fill='white' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css?v=pr13-live-qa-20260711e" />
    <link rel="stylesheet" href="./styles-polish.css?v=pr13-live-qa-20260711e" />
    <link rel="stylesheet" href="./styles-context.css?v=pr13-live-qa-20260711e" />
  </head>
  <body>
    <svg class="icon-definitions" aria-hidden="true" focusable="false"><symbol id="study-marks-icon" viewBox="0 0 24 24"><path d="M6 3.75h12A2.25 2.25 0 0 1 20.25 6v14.25L16.5 18l-4.5 2.25L7.5 18l-3.75 2.25V6A2.25 2.25 0 0 1 6 3.75Zm0 2.5a.25.25 0 0 0-.25.25v9.34l1.75-1.05 4.5 2.25 4.5-2.25 1.75 1.05V6.5a.25.25 0 0 0-.25-.25H6Z"></path></symbol></svg>
    <header class="app-header">
      <button id="homeButton" class="brand home-button" type="button" title="Open home">
        <span class="brand-mark">BA</span>
        <div>
          <h1>Bible App Reader</h1>
        </div>
      </button>
      <nav class="reader-controls" aria-label="Reader controls">
        <label>
          <span>Translation</span>
          <select id="translationSelect"></select>
        </label>
        <label>
          <span>Book</span>
          <select id="bookSelect" class="reader-native-select"></select>
          <button id="bookPickerButton" class="reader-picker-button" type="button" aria-haspopup="dialog" aria-expanded="false">
            Select book
          </button>
          <div id="bookPickerPanel" class="reader-picker-panel book-picker-panel" hidden></div>
        </label>
        <label>
          <span>Chapter</span>
          <select id="chapterSelect" class="reader-native-select"></select>
          <button id="chapterPickerButton" class="reader-picker-button" type="button" aria-haspopup="dialog" aria-expanded="false">
            Select chapter
          </button>
          <div id="chapterPickerPanel" class="reader-picker-panel chapter-picker-panel" hidden></div>
        </label>
      </nav>
      <p id="statusText" class="header-status" role="status" aria-live="polite">Loading data...</p>
      <button id="themeToggle" class="theme-toggle-button" type="button" title="Switch to dark theme" aria-label="Switch to dark theme" aria-pressed="false">
        <span class="theme-option theme-sun" aria-hidden="true">☀</span>
        <span class="theme-switch-track" aria-hidden="true">
          <span class="theme-switch-thumb"></span>
        </span>
        <span class="theme-option theme-moon" aria-hidden="true">☾</span>
      </button>
    </header>

    <main class="app-shell">
      <section class="reader-pane" aria-label="Bible reader">
        <div class="chapter-title">
          <div class="chapter-heading">
            <div class="chapter-heading-title">
              <h2 id="chapterTitle">Loading...</h2>
              <div class="chapter-favorite-actions" aria-label="Current reading favorites">
                <span id="bookTagControl" class="scope-mark-control"></span>
                <span id="chapterTagControl" class="scope-mark-control"></span>
              </div>
            </div>
            <div class="chapter-stepper" aria-label="Chapter navigation">
              <button id="prevChapter" class="chapter-nav-button" type="button" title="Previous chapter">
                <span aria-hidden="true">‹</span>
                <span>Previous</span>
              </button>
              <button id="nextChapter" class="chapter-nav-button" type="button" title="Next chapter">
                <span>Next</span>
                <span aria-hidden="true">›</span>
              </button>
            </div>
          </div>
          <div class="chapter-actions" aria-label="Chapter tools">
            <div class="action-group" aria-label="Study tools">
              <button id="showSearch" class="toolbar-button primary-tool" type="button" title="Search this book">
                <span aria-hidden="true" class="toolbar-icon">⌕</span>
                <span>Search</span>
              </button>
              <button id="openStudyPanel" class="toolbar-button mobile-detail-launcher" type="button" title="Open study panel">
                <span aria-hidden="true" class="toolbar-icon">☰</span>
                <span>Study panel</span>
              </button>
              <button id="showInterlinear" class="toolbar-button" type="button" title="Original language study" aria-label="Language Study">
                <span aria-hidden="true" class="toolbar-icon">א</span><span>Language Study</span>
              </button>
              <button id="showOutline" class="toolbar-button" type="button" title="Book outline" aria-label="Outline">
                <span aria-hidden="true" class="toolbar-icon">☷</span><span>Outline</span>
              </button>
            </div>
            <div class="action-group" aria-label="Workspace tools">
              <button id="showTags" class="toolbar-button" type="button" title="Review study marks and labels">
                <svg aria-hidden="true" class="toolbar-icon study-marks-icon"><use href="#study-marks-icon"></use></svg>
                <span>Study Marks</span>
              </button>
              <button id="showProverbs" class="toolbar-button" type="button" title="Translation workspace">
                <span aria-hidden="true" class="toolbar-icon">✎</span>
                <span>Translate</span>
              </button>
              <button id="showJobs" class="toolbar-button" type="button" title="Local study processing">
                <span aria-hidden="true" class="toolbar-icon">↻</span>
                <span>Processing</span>
              </button>
              <button id="showUserData" class="toolbar-button" type="button" title="Study data">
                <span aria-hidden="true" class="toolbar-icon">▣</span>
                <span>Study Data</span>
              </button>
            </div>
          </div>
        </div>
        <div class="reader-floating-nav" aria-label="Reader chapter navigation">
          <button id="prevChapterFloat" class="reader-nav-arrow previous-chapter" type="button" title="Previous chapter" aria-label="Previous chapter">
            ‹
          </button>
          <button id="nextChapterFloat" class="reader-nav-arrow next-chapter" type="button" title="Next chapter" aria-label="Next chapter">
            ›
          </button>
        </div>
        <div id="chapterContent" class="chapter-content"></div>
      </section>

      <aside class="detail-pane" aria-label="Reference details">
        <div class="detail-header">
          <h2 id="detailTitle">Details</h2>
          <div class="detail-header-actions">
            <button id="clearDetail" type="button">Clear</button>
          </div>
        </div>
        <div id="detailContext" class="detail-context" hidden></div>
        <div class="detail-floating-nav" aria-label="Detail panel history">
          <button id="detailBack" class="detail-nav-arrow" type="button" title="Panel history back" aria-label="Panel history back" disabled>
            ↶
          </button>
          <button id="detailForward" class="detail-nav-arrow" type="button" title="Panel history forward" aria-label="Panel history forward" disabled>
            ↷
          </button>
        </div>
        <div id="detailContent" class="detail-content">
          Select a verse, tag, or reader tool.
        </div>
      </aside>
    </main>

    <script type="module" src="./app.js?v=pr13-live-qa-20260711e"></script>
    <script type="module" src="./src/reader-picker-flow.js?v=pr13-live-qa-20260711e"></script>
    <script type="module" src="./src/original-language-study-flow.js?v=pr13-live-qa-20260711e"></script>
  </body>
</html>
