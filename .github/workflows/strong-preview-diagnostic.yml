name: Strong Preview Diagnostic

on:
  pull_request:
    paths:
      - ".github/workflows/strong-preview-diagnostic.yml"
      - "app/scripts/strong-preview-hydration-test.mjs"
      - "app/src/strong-reference-control.js"
      - "package.json"

permissions:
  contents: read

jobs:
  focused-preview-test:
    runs-on: windows-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "20"
          - "24"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run focused Strong's preview regression
        run: node ./app/scripts/strong-preview-hydration-test.mjs
