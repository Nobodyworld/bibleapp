name: Strong Preview Diagnostic

on:
  pull_request:
    paths:
      - ".github/workflows/strong-preview-diagnostic.yml"
      - "app/scripts/strong-preview-hydration-test.mjs"
      - "app/src/strong-reference-control.js"
      - "package.json"

permissions:
  contents: read

jobs:
  node-24-segment-diagnostic:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static and domain verification
        run: npm run test:static

      - name: Run desktop interaction journey
        run: node ./app/scripts/interaction-test.mjs

      - name: Run frozen-highlight journey
        run: node ./app/scripts/frozen-highlight-interaction-test.mjs

      - name: Run Language Study journey
        run: node ./app/scripts/original-language-study-interaction-test.mjs

      - name: Run focused Strong's preview regression
        run: node ./app/scripts/strong-preview-hydration-test.mjs

      - name: Run mobile interaction journey
        run: node ./app/scripts/interaction-test.mjs --mobile

      - name: Run publish audit
        run: npm run audit
