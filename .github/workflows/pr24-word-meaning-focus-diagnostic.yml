name: PR24 Word Meaning Focus Diagnostic

on:
  push:
    branches:
      - phase2-word-meaning-utility
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focus-regression:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 24]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run focused outside-focus regression
        run: npm run test:word-meaning-focus
